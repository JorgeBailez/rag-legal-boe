<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 372" role="img" aria-labelledby="gt gd">
<title id="gt">Diagrama de Gantt de las fases del proyecto</title>
<desc id="gd">Cronograma aproximado de las ocho fases del proyecto entre noviembre de 2025 y julio de 2026. La documentacion arranca a finales de mayo. Todas las fases concluyen en la entrega, el 11 de julio de 2026, donde terminan las barras.</desc>
<style>
  .panel{fill:#ffffff;stroke:#dfe6f2;}
  .stripe{fill:#f3f7fd;}
  .grid{stroke:#e3e9f4;stroke-width:1;}
  .mth{fill:#122e74;font-family:'Lato','Segoe UI',sans-serif;font-size:11px;font-weight:600;text-anchor:middle;}
  .yr{fill:#5b6b8c;font-family:'Lato','Segoe UI',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-anchor:middle;}
  .row{fill:#122e74;font-family:'Lato','Segoe UI',sans-serif;font-size:10.5px;font-weight:600;}
  .bar{fill:#4a92d4;stroke:#2b4a9e;stroke-width:1;}
  .tag{fill:#4a92d4;font-family:'Lato','Segoe UI',sans-serif;font-size:10px;font-weight:700;letter-spacing:.6px;}
  .flag{stroke:#c0392b;stroke-width:1.4;stroke-dasharray:4 3;}
  .flagt{fill:#c0392b;font-family:'Lato','Segoe UI',sans-serif;font-size:10px;font-weight:700;text-anchor:middle;}
</style>
